name: uv tool install Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "pyprland/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/uv-install.yml"
  push:
    paths:
      - "pyprland/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/uv-install.yml"

jobs:
  install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install with uv tool install
        run: uv tool install .

      - name: Smoke test
        run: |
          # Verify entry point is on PATH
          which pypr
          # Verify the package is importable and the entry point module loads
          # (use uv run to execute within the tool's isolated environment)
          uv run --from pyprland python -c "from pyprland.command import main; print('pypr entry point OK')"
          uv run --from pyprland python -c "from pyprland.version import VERSION; print('pyprland', VERSION)"
